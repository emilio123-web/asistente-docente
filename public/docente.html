<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-4xl bg-white shadow-xl rounded-2xl p-8 space-y-6">
    <h1 class="text-3xl font-bold text-blue-800">Panel Docente</h1>

    <div class="space-y-4">
        <input 
            type="text" 
            id="materiaId" 
            placeholder="ID de la materia (ej: calculo-1)" 
            class="w-full border p-3 rounded-lg"
        >

        <input 
            type="password" 
            id="codigoAcceso" 
            placeholder="Código de acceso para alumnos" 
            class="w-full border p-3 rounded-lg"
        >

        <input 
            type="file" 
            id="archivo" 
            accept=".pdf" 
            class="w-full border p-3 rounded-lg"
        >

        <textarea 
            id="textoAdicional" 
            placeholder="Información adicional (fechas, avisos, consignas...)" 
            class="w-full border p-3 rounded-lg h-32"
        ></textarea>

        <button 
            onclick="subirMaterial()" 
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-semibold"
        >
            Crear / Actualizar Materia
        </button>

        <p id="mensaje" class="text-sm text-green-600"></p>
    </div>

    <hr>

    <div>
        <h2 class="text-xl font-semibold mb-3">Materias creadas</h2>
        <div id="listaMaterias" class="space-y-2 text-gray-700"></div>
    </div>
</div>

<script>
const API_URL = "https://asistente-docente.onrender.com";

async function subirMaterial() {
    const materiaId = document.getElementById('materiaId').value;
    const codigoAcceso = document.getElementById('codigoAcceso').value;
    const texto = document.getElementById('textoAdicional').value;
    const fileInput = document.getElementById('archivo');
    const mensaje = document.getElementById('mensaje');

    if (!materiaId || !codigoAcceso) {
        alert("Debes completar materia y código de acceso.");
        return;
    }

    const formData = new FormData();
    formData.append("materiaId", materiaId);
    formData.append("codigoAcceso", codigoAcceso);
    formData.append("textoAdicional", texto);
    if (fileInput.files[0]) formData.append("archivo", fileInput.files[0]);

    mensaje.innerText = "Guardando materia...";

    try {
        const res = await fetch(`${API_URL}/docente/subir-material`, {
            method: 'POST',
            body: formData
        });

        const data = await res.json();
        mensaje.innerText = data.mensaje || data.error;
        cargarMaterias();

    } catch (err) {
        mensaje.innerText = "Error al conectar con el servidor.";
    }
}

async function cargarMaterias() {
    const lista = document.getElementById('listaMaterias');

    try {
        const res = await fetch(`${API_URL}/materias`);
        const materias = await res.json();

        lista.innerHTML = "";

        materias.forEach(m => {
            lista.innerHTML += `
                <div class="p-3 border rounded-lg bg-gray-50">
                    <strong>${m.materiaId}</strong>
                </div>
            `;
        });

    } catch (err) {
        lista.innerHTML = "No se pudieron cargar las materias.";
    }
}

cargarMaterias();
</script>

</body>
</html>
